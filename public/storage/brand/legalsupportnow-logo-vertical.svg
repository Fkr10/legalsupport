<svg width="280" height="320" viewBox="0 0 280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradientVert" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B1C2C;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowFilterV">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15" />
    </filter>
  </defs>

  <style>
    .brand-text-v {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 36px;
      font-weight: 700;
      fill: #0B1C2C;
      letter-spacing: -0.8px;
      text-anchor: middle;
    }
    .accent-text-v {
      fill: #C8A951;
    }
    .tagline-v {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 12px;
      fill: #1F2937;
      letter-spacing: 1px;
      text-anchor: middle;
      font-weight: 500;
    }
  </style>

  <!-- Shield Logo - Centered and larger -->
  <g transform="translate(90, 20)">
    <!-- Shield background -->
    <path d="M 16 0 L 16 32 Q 16 56 50 64 Q 84 56 84 32 L 84 0 Q 50 12 50 12 Q 50 12 16 0 Z" 
          fill="url(#shieldGradientVert)" 
          stroke="#C8A951" 
          stroke-width="2" 
          stroke-opacity="0.4"
          filter="url(#shadowFilterV)"/>

    <!-- Left Scale Pan -->
    <g>
      <circle cx="36" cy="40" r="3" fill="#C8A951" opacity="0.8"/>
      <line x1="36" y1="40" x2="22" y2="40" stroke="#C8A951" stroke-width="3.5" stroke-linecap="round"/>
      <rect x="16" y="42" width="10" height="7" rx="2" fill="#C8A951" opacity="0.85"/>
      <line x1="21" y1="42" x2="21" y2="34" stroke="#C8A951" stroke-width="1.5" opacity="0.65"/>
    </g>

    <!-- Right Scale Pan -->
    <g>
      <line x1="36" y1="40" x2="50" y2="40" stroke="#C8A951" stroke-width="3.5" stroke-linecap="round"/>
      <rect x="50" y="42" width="10" height="7" rx="2" fill="#C8A951" opacity="0.85"/>
      <line x1="55" y1="42" x2="55" y2="34" stroke="#C8A951" stroke-width="1.5" opacity="0.65"/>
    </g>

    <!-- Center Gavel -->
    <g transform="translate(50, 28)">
      <rect x="-5" y="-3" width="10" height="7" rx="1.5" fill="#C8A951" opacity="0.9"/>
      <line x1="0" y1="4" x2="0" y2="14" stroke="#C8A951" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="-3" y="14" width="6" height="3" rx="1" fill="#C8A951" opacity="0.75"/>
    </g>

    <!-- Shield accent border -->
    <path d="M 18 6 Q 50 2 82 6" 
          stroke="#C8A951" 
          stroke-width="2" 
          fill="none" 
          stroke-linecap="round" 
          opacity="0.6"/>

    <!-- Trust indicators -->
    <g opacity="0.65">
      <circle cx="50" cy="60" r="1.8" fill="#C8A951"/>
      <circle cx="40" cy="63" r="1.3" fill="#C8A951"/>
      <circle cx="60" cy="63" r="1.3" fill="#C8A951"/>
    </g>
  </g>

  <!-- Brand Text -->
  <text x="140" y="220" class="brand-text-v">
    LegalSupport<tspan class="accent-text-v">Now</tspan>
  </text>

  <!-- Tagline -->
  <text x="140" y="250" class="tagline-v">CRIMINAL DEFENSE • FAST ACTION</text>

  <!-- Subtitle -->
  <text x="140" y="275" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; font-size: 11px; fill: #1F2937; letter-spacing: 0.3px; text-anchor: center;">
    Professional Legal Support
  </text>
</svg>
