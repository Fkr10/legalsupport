<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B1C2C;stop-opacity:1" />
    </linearGradient>
    <filter id="sf">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Shield background -->
  <path d="M 16 4 L 16 24 Q 16 40 32 46 Q 48 40 48 24 L 48 4 Q 32 10 32 10 Q 32 10 16 4 Z" 
        fill="url(#shieldGrad)" 
        stroke="#C8A951" 
        stroke-width="1.5" 
        stroke-opacity="0.3"
        filter="url(#sf)"/>

  <!-- Left Scale Pan -->
  <g>
    <circle cx="26" cy="28" r="2" fill="#C8A951" opacity="0.7"/>
    <line x1="26" y1="28" x2="18" y2="28" stroke="#C8A951" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="14" y="29" width="6" height="5" rx="1.5" fill="#C8A951" opacity="0.8"/>
    <line x1="17" y1="29" x2="17" y2="24" stroke="#C8A951" stroke-width="1.2" opacity="0.6"/>
  </g>

  <!-- Right Scale Pan -->
  <g>
    <line x1="26" y1="28" x2="38" y2="28" stroke="#C8A951" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="38" y="29" width="6" height="5" rx="1.5" fill="#C8A951" opacity="0.8"/>
    <line x1="41" y1="29" x2="41" y2="24" stroke="#C8A951" stroke-width="1.2" opacity="0.6"/>
  </g>

  <!-- Center Gavel -->
  <g transform="translate(32, 18)">
    <rect x="-3.5" y="-2" width="7" height="5" rx="1.2" fill="#C8A951" opacity="0.9"/>
    <line x1="0" y1="3" x2="0" y2="10" stroke="#C8A951" stroke-width="2" stroke-linecap="round"/>
    <rect x="-2.5" y="10" width="5" height="2" rx="0.7" fill="#C8A951" opacity="0.7"/>
  </g>

  <!-- Shield accent border -->
  <path d="M 17 8 Q 32 4 47 8" 
        stroke="#C8A951" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round" 
        opacity="0.5"/>

  <!-- Trust indicators -->
  <g opacity="0.6">
    <circle cx="32" cy="42" r="1.2" fill="#C8A951"/>
    <circle cx="26" cy="44" r="0.9" fill="#C8A951"/>
    <circle cx="38" cy="44" r="0.9" fill="#C8A951"/>
  </g>
</svg>
