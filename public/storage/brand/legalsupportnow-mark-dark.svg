<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradientDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a5a6d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a4a5d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowFilterDark">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <style>
    .brand-text-dark {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 24px;
      font-weight: 700;
      fill: #FFFFFF;
      letter-spacing: -0.5px;
    }
    .accent-text-dark {
      fill: #E2C373;
      font-weight: 700;
    }
  </style>

  <!-- Shield Logo -->
  <g transform="translate(12, 8)">
    <!-- Shield background - lighter for dark bg -->
    <path d="M 8 0 L 8 16 Q 8 28 24 32 Q 40 28 40 16 L 40 0 Q 24 4 24 4 Q 24 4 8 0 Z" 
          fill="url(#shieldGradientDark)" 
          stroke="#E2C373" 
          stroke-width="1.5" 
          stroke-opacity="0.4"
          filter="url(#shadowFilterDark)"/>

    <!-- Left Scale Pan -->
    <g>
      <circle cx="18" cy="18" r="1.5" fill="#E2C373" opacity="0.85"/>
      <line x1="18" y1="18" x2="12" y2="18" stroke="#E2C373" stroke-width="2" stroke-linecap="round"/>
      <rect x="9" y="19" width="5" height="4" rx="1" fill="#E2C373" opacity="0.85"/>
      <line x1="11.5" y1="19" x2="11.5" y2="16" stroke="#E2C373" stroke-width="1" opacity="0.7"/>
    </g>

    <!-- Right Scale Pan -->
    <g>
      <line x1="18" y1="18" x2="30" y2="18" stroke="#E2C373" stroke-width="2" stroke-linecap="round"/>
      <rect x="28" y="19" width="5" height="4" rx="1" fill="#E2C373" opacity="0.85"/>
      <line x1="30.5" y1="19" x2="30.5" y2="16" stroke="#E2C373" stroke-width="1" opacity="0.7"/>
    </g>

    <!-- Center Gavel -->
    <g transform="translate(24, 12)">
      <rect x="-3" y="-2" width="6" height="4" rx="1" fill="#E2C373" opacity="0.9"/>
      <line x1="0" y1="2" x2="0" y2="8" stroke="#E2C373" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="-2" y="8" width="4" height="1.5" rx="0.5" fill="#E2C373" opacity="0.8"/>
    </g>

    <!-- Shield accent border -->
    <path d="M 9 2 Q 24 0 39 2" 
          stroke="#E2C373" 
          stroke-width="1.5" 
          fill="none" 
          stroke-linecap="round" 
          opacity="0.6"/>

    <!-- Trust indicators -->
    <g opacity="0.7">
      <circle cx="24" cy="28" r="0.8" fill="#E2C373"/>
      <circle cx="20" cy="29" r="0.6" fill="#E2C373"/>
      <circle cx="28" cy="29" r="0.6" fill="#E2C373"/>
    </g>
  </g>

  <!-- Brand Text - Light for dark background -->
  <text x="70" y="51" class="brand-text-dark">
    LegalSupport<tspan class="accent-text-dark">Now</tspan>
  </text>

  <!-- Tagline -->
  <text x="70" y="68" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; font-size: 11px; fill: #B0B0B0; letter-spacing: 0.5px; font-weight: 500;">
    CRIMINAL DEFENSE • FAST ACTION
  </text>
</svg>
