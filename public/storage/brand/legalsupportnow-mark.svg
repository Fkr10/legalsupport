<svg width="280" height="72" viewBox="0 0 280 72" xmlns="http://www.w3.org/2000/svg">
  <style>
    .main-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 22px;
      font-weight: 600;
      fill: #FFFFFF;
      letter-spacing: 0.2px;
    }
    .accent-text {
      fill: #E2C373;
      font-weight: 600;
    }
  </style>

  <!-- Icon -->
  <g transform="translate(8,10)">
    
    <!-- Outer (white) -->
    <rect x="0" y="0" width="48" height="48" rx="12" fill="#FFFFFF"/>

    <!-- Subtle inner contrast -->
    <rect x="1.2" y="1.2" width="45.6" height="45.6" rx="10.8"
          fill="none" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>

    <!-- Gold path -->
    <path d="M16 16 L16 32 L32 32"
          stroke="#C8A951"
          stroke-width="4"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Dot -->
    <circle cx="32" cy="16" r="3.5" fill="#E2C373"/>

  </g>

  <!-- Text -->
  <text x="66" y="42" class="main-text">
    LegalSupport<tspan class="accent-text">Now</tspan>
  </text>

</svg>