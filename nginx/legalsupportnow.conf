server {
  listen 80;
  server_name legalsupportnow.in www.legalsupportnow.in;

  # If using Certbot, you can add the HTTPS server block separately.

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Optional: cache static assets aggressively
  location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|gif|ico|woff2?)$ {
    proxy_pass http://127.0.0.1:3000;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }
}

