server {
  listen 8080;
  server_name _;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

  # Performance optimizations
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
  gzip_min_length 1000;
  gzip_disable "msie6";

  root /usr/share/nginx/html;
  index index.html index.htm;

  # Single Page Application routing
  location / {
    try_files $uri $uri/ /index.html;
    
    # Cache busting for index.html - never cache the main HTML file
    add_header Cache-Control "no-cache, no-store, must-revalidate, public, max-age=0";
  }

  # Cache static assets aggressively
  location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|gif|ico|woff|woff2|ttf|eot)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Deny access to sensitive files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Deny access to common backup and temp files
  location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Custom error pages
  error_page 404 /index.html;
  error_page 500 502 503 504 /index.html;

  # Logging
  access_log /var/log/nginx/access.log combined buffer=32k flush=5s;
  error_log /var/log/nginx/error.log warn;
}

