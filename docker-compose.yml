version: '3.8'

services:
  legalsupportnow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legalsupportnow-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - ./dist:/app/dist:ro
    networks:
      - legalsupportnow-network

networks:
  legalsupportnow-network:
    driver: bridge
