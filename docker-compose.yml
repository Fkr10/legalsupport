version: '3.8'

services:
  legalsupportnow:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: legalsupportnow-app
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    networks:
      - legalsupportnow-network
    labels:
      - "com.example.description=LegalSupportNow Application"
      - "com.example.version=1.0.0"
    security_opt:
      - no-new-privileges:true

networks:
  legalsupportnow-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
