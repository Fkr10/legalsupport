# Docker Compose Override for Development
# Copy to docker-compose.override.yml for local development

version: '3.8'

services:
  legalsupportnow:
    build:
      args:
        - NODE_ENV=development
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app:cached
      - /app/node_modules
      - /app/dist
    ports:
      - "8080:8080"
